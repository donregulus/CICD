
    upstream jenkins {
        server jenkins:8080;  # This matches your docker-compose service name
    }

    # Redirect all other HTTP traffic to HTTPS
    server {
        listen 80;
        server_name cicd.stroalgo.com;    

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS server configuration
    server {
        listen 443 ssl http2;
        server_name cicd.stroalgo.com;

        # SSL Certificate Paths (Managed by Certbot)
        ssl_certificate /etc/letsencrypt/live/cicd.stroalgo.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/cicd.stroalgo.com/privkey.pem;

        # Security Best Practices
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        location / {
            proxy_pass              http://jenkins;
            proxy_set_header        Host $host;
            proxy_set_header        X-Real-IP $remote_addr;
            proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header        X-Forwarded-Proto $scheme;
            proxy_set_header        X-Forwarded-Host $host;
            proxy_set_header        X-Forwarded-Port 443;
            
            # Support for Jenkins WebSockets
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
